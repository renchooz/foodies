services:

  backend:
    build: ./server
    container_name: backend_foodies
    restart: unless-stopped
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"

  frontend:
    build: ./client
    container_name: frontend_foodies
    restart: unless-stopped
    env_file:
      - ./client/.env
    ports:
      - "5173:80"
    depends_on:
      - backend

